spring:
  application:
    name: fluxpay-api
  datasource:
    url: jdbc:h2:mem:fluxpay;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: false
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

fluxpay:
  gateways:
    cashfree:
      app-id: ${CASHFREE_APP_ID:TEST430329ae80e0f32e41a393d78b923034}
      secret-key: ${CASHFREE_SECRET_KEY:TESTaf195616268bd6202eeb3bf8dc458956e7192a85}
      environment: ${CASHFREE_ENVIRONMENT:SANDBOX}
