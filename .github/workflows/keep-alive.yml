name: Keep Render Backend Awake

on:
  schedule:
    # Run every 10 minutes to prevent Render's 15-minute inactivity sleep
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_URL }}" ]; then
            echo "RENDER_BACKEND_URL secret is not set. Skipping ping."
            exit 0
          fi
          echo "Pinging backend to keep it awake..."
          curl -sS -m 10 "${{ secrets.RENDER_BACKEND_URL }}/actuator/health" || echo "Ping failed, but workflow continues."
